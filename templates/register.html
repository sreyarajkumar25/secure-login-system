{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="card">
  <h1>Create Account</h1>
  <form method="POST" action="{{ url_for('register') }}">
    <label for="username">Username</label>
    <input type="text" id="username" name="username" required pattern="[a-zA-Z0-9_]{3,32}" autocomplete="username">

    <label for="email">Email</label>
    <input type="email" id="email" name="email" required autocomplete="email">

    <label for="password">Password</label>
    <input type="password" id="password" name="password" required minlength="8" autocomplete="new-password">
    <small class="hint">Min 8 chars, uppercase, lowercase, and a number</small>

    <label for="confirm_password">Confirm Password</label>
    <input type="password" id="confirm_password" name="confirm_password" required autocomplete="new-password">

    <button type="submit" class="btn btn-primary">Register</button>
  </form>
  <p class="muted">Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
</div>
{% endblock %}
